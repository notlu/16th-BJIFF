<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2026北京国际电影节展映排片</title>
    <link rel="stylesheet" href="schedule-browser/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">BJIFF Browser</p>
          <h1>2026北京国际电影节展映排片</h1>
          <p class="hero-meta">Made by OldJohn(vx:newbeatle)</p>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Browse</p>
                <h2>浏览排片</h2>
              </div>
            </div>

            <label class="field">
              <span>日期</span>
              <select id="filter-date"></select>
            </label>

            <label class="field">
              <span>城市</span>
              <select id="filter-city"></select>
            </label>

            <div class="field">
              <span>影院</span>
              <div class="field-toolbar">
                <small class="field-hint" id="filter-cinema-summary">未限制影院，默认显示全部</small>
                <div class="field-toolbar-actions">
                  <button class="mini-button filter-action-button" id="select-all-cinemas" type="button">全选</button>
                  <button class="mini-button filter-action-button" id="clear-cinemas" type="button">清空</button>
                </div>
              </div>
              <div id="filter-cinema" class="choice-list" role="group" aria-label="影院多选"></div>
            </div>

            <label class="field">
              <span>活动</span>
              <select id="filter-activity"></select>
            </label>

            <label class="field">
              <span>单元</span>
              <select id="filter-unit"></select>
            </label>

            <label class="field">
              <span>片名</span>
              <textarea id="filter-search" rows="3" placeholder="输入多个片名，支持逗号、顿号、分号或换行"></textarea>
              <small class="field-hint">模糊匹配片名；输入多个片名时命中任意一个即可</small>
            </label>

            <div class="quick-actions">
              <button class="button secondary" id="reset-filters">重置筛选</button>
            </div>
          </section>

        </aside>

        <section class="content">
          <section class="panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Timeline</p>
                <h2>排片时间轴</h2>
              </div>
              <div class="day-summary" id="day-summary"></div>
            </div>

            <div class="legend">
              <span><i class="legend-dot activity"></i> 含活动信息</span>
            </div>

            <div class="timeline-scroll">
              <div id="timeline"></div>
            </div>
          </section>

          <section class="panel">
            <div class="section-head compact">
              <div>
                <p class="eyebrow">List</p>
                <h2>场次列表</h2>
              </div>
            </div>
            <div id="screening-list" class="screening-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="data/festival-data.js"></script>
    <script src="schedule-browser/app.js"></script>
  </body>
</html>
